<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle AI Agent</title>
  <style>
    :root{
      --bg:#0f1117;
      --card:#1a1d27;
      --card2:#22262f;
      --text:#e2e8f0;
      --muted:#8892a4;
      --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.12);
      --primary:#6366f1;
      --primary-2:#818cf8;
      --danger:#f87171;
      --ok:#34d399;
      --warn:#fbbf24;
      --cyan:#22d3ee;
      --radius:12px;
      --shadow:0 8px 24px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
    }
    ::selection{background:var(--primary);color:#fff}
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .top{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    h1{font-size:1.35rem;margin:0;color:#fff}
    .status{
      display:flex;align-items:center;gap:6px;
      font-size:.82rem;
      color:var(--muted);
    }
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot.on{background:var(--ok);box-shadow:0 0 6px rgba(52,211,153,.5)}
    .dot.off{background:var(--danger);box-shadow:0 0 6px rgba(248,113,113,.5)}
    .tabs{
      display:flex;
      gap:4px;
      margin-bottom:14px;
      background:var(--card);
      border-radius:var(--radius);
      padding:4px;
      border:1px solid var(--line);
    }
    .tab{
      flex:1;
      border:none;
      background:none;
      color:var(--muted);
      padding:8px 12px;
      border-radius:9px;
      cursor:pointer;
      font-weight:600;
      font-size:.9rem;
      text-align:center;
      transition:.15s;
    }
    .tab:hover{color:var(--text)}
    .tab.active{
      background:var(--primary);
      color:#fff;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      margin-bottom:12px;
    }
    .label{
      color:var(--primary-2);
      font-size:.72rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.1em;
      margin-bottom:6px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1 1 220px}
    textarea,input,select{
      width:100%;
      border:1px solid var(--line2);
      border-radius:10px;
      padding:10px;
      font:inherit;
      background:var(--bg);
      color:var(--text);
    }
    textarea:focus,input:focus,select:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(99,102,241,.2);
    }
    textarea{min-height:88px;resize:vertical}
    .btn{
      border:1px solid var(--line2);
      background:var(--card2);
      color:var(--text);
      padding:9px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:.15s;
    }
    .btn:hover{background:#2a2e3a}
    .btn:active{transform:scale(.97)}
    .btn.primary{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }
    .btn.primary:hover{filter:brightness(1.1)}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .examples{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}
    .pill{
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      padding:8px 12px;
      text-align:left;
      cursor:pointer;
      font-size:.85rem;
      color:var(--muted);
      transition:.15s;
      font-family:inherit;
    }
    .pill:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.25);color:var(--text)}
    .grid3{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
      margin-bottom:12px;
    }
    @media (max-width:880px){.grid3{grid-template-columns:1fr}}
    .metric{
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      background:var(--card);
      text-align:center;
    }
    .metric b{font-size:1.3rem;display:block;color:#fff}
    .metric span{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .sql{
      background:var(--bg);
      color:var(--cyan);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      overflow:auto;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:.82rem;
      white-space:pre-wrap;
      line-height:1.5;
    }
    .alert{
      border-radius:10px;
      border:1px solid;
      padding:9px 10px;
      font-size:.9rem;
      margin-bottom:8px;
    }
    .alert.error{color:var(--danger);border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.06)}
    .alert.ok{color:var(--ok);border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.06)}
    .alert.info{color:var(--primary-2);border-color:rgba(99,102,241,.15);background:rgba(99,102,241,.06)}
    .hide{display:none}
    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:10px;
    }
    table{border-collapse:collapse;width:100%;font-size:.84rem}
    th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
    th{background:var(--card2);font-size:.72rem;text-transform:uppercase;color:var(--muted);letter-spacing:.04em}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .vehicles{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
      gap:10px;
    }
    .vehicle{
      border:1px solid var(--line);
      border-radius:10px;
      overflow:hidden;
      background:var(--card);
      transition:.15s;
    }
    .vehicle:hover{border-color:var(--line2);transform:translateY(-1px)}
    .vehicle img{
      width:100%;
      height:140px;
      object-fit:cover;
      display:block;
      background:var(--bg);
    }
    .vehicle .b{padding:10px}
    .vehicle b{color:#fff}
    .muted{color:var(--muted)}
    .right{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;align-items:center}
    .page-info{font-size:.82rem;color:var(--muted)}
    .badge{
      display:inline-block;
      padding:2px 8px;
      border-radius:99px;
      font-size:.72rem;
      font-weight:700;
    }
    .badge-ok{background:rgba(52,211,153,.12);color:var(--ok);border:1px solid rgba(52,211,153,.2)}
    .badge-warn{background:rgba(251,191,36,.12);color:var(--warn);border:1px solid rgba(251,191,36,.2)}
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <h1>Vehicle AI Agent</h1>
      <div class="status" id="healthStatus"><span class="dot"></span> Łączenie...</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="agent">Agent</button>
      <button class="tab" data-tab="classifier">Klasyfikator</button>
      <button class="tab" data-tab="fleet">Flota</button>
    </div>

    <section id="tab-agent">
      <div class="card">
        <div class="label">Pytanie do agenta</div>
        <textarea id="questionInput" placeholder="np. Co ma Kowalski?">Co ma Kowalski?</textarea>
        <div class="right" style="margin-top:10px">
          <button class="btn" id="clearAgent">Wyczyść</button>
          <button class="btn primary" id="runAgent">Uruchom</button>
        </div>
      </div>

      <div class="card">
        <div class="label">Przykładowe pytania</div>
        <div class="examples" id="examples"></div>
      </div>

      <div id="agentResult"></div>
    </section>

    <section id="tab-classifier" class="hide">
      <div class="card">
        <div class="row">
          <div>
            <div class="label">URL obrazu</div>
            <input id="urlInput" type="url" placeholder="https://...">
            <div class="right" style="margin-top:10px">
              <button class="btn primary" id="runUrlClassify">Klasyfikuj URL</button>
            </div>
          </div>
          <div>
            <div class="label">Plik obrazu</div>
            <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp">
            <div class="right" style="margin-top:10px">
              <button class="btn" id="runFileClassify" disabled>Klasyfikuj plik</button>
            </div>
          </div>
        </div>
      </div>
      <div id="classifyResult"></div>
    </section>

    <section id="tab-fleet" class="hide">
      <div class="card">
        <div class="row">
          <div>
            <div class="label">Szukaj</div>
            <input id="fleetSearch" type="text" placeholder="Marka lub model...">
          </div>
          <div>
            <div class="label">Status</div>
            <select id="fleetStatus">
              <option value="all">Wszystkie</option>
              <option value="available">Dostępne</option>
              <option value="sold">Sprzedane</option>
            </select>
          </div>
          <div>
            <div class="label">Sortowanie</div>
            <select id="fleetSort">
              <option value="brand_asc">Marka A–Z</option>
              <option value="price_desc">Cena malejąco</option>
              <option value="price_asc">Cena rosnąco</option>
              <option value="year_desc">Rok malejąco</option>
              <option value="year_asc">Rok rosnąco</option>
            </select>
          </div>
        </div>
        <div class="right" style="margin-top:10px">
          <button class="btn" id="refreshFleet">Odśwież</button>
        </div>
      </div>

      <div id="fleetMetrics" class="grid3"></div>
      <div id="fleetView"></div>
    </section>
  </div>

  <script>
    const API = "";
    const TIMEOUT_MS = 25000;
    const PAGE_SIZE = 6;

    let fleetData = [];
    let fleetOffset = 0;
    let selectedFile = null;

    function esc(value){
      if(value == null) return "";
      const el = document.createElement("div");
      el.textContent = String(value);
      return el.innerHTML;
    }

    function formatPrice(v){
      if(v == null || v === "") return "–";
      try { return `${Number(v).toLocaleString("pl-PL")} PLN`; }
      catch { return String(v); }
    }

    function formatConfidence(v){
      if(v == null) return "–";
      return `${(Number(v) * 100).toFixed(1)}%`;
    }

    function imageUrl(ref){
      if(!ref) return null;
      if(ref.startsWith("http://") || ref.startsWith("https://")) return ref;
      return `${API}/assets/images/${ref.split("/").pop()}`;
    }

    async function apiFetch(path, options = {}){
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);
      try{
        const resp = await fetch(`${API}${path}`, {...options, signal: controller.signal});
        clearTimeout(timer);
        return resp;
      }catch(err){
        clearTimeout(timer);
        throw err;
      }
    }

    async function safeJson(resp){
      try { return await resp.json(); }
      catch { return {}; }
    }

    function switchTab(tab){
      document.querySelectorAll(".tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      document.querySelectorAll("section[id^='tab-']").forEach(sec => sec.classList.add("hide"));
      document.getElementById(`tab-${tab}`).classList.remove("hide");
      if(tab === "fleet" && fleetData.length === 0) loadFleet();
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });

    async function loadHealth(){
      const el = document.getElementById("healthStatus");
      try{
        const resp = await apiFetch("/api/health");
        const data = await safeJson(resp);
        if(resp.ok && data.status === "ok"){
          el.innerHTML = `<span class="dot on"></span> Połączony`;
        }else{
          el.innerHTML = `<span class="dot off"></span> Problem z backendem`;
        }
      }catch{
        el.innerHTML = `<span class="dot off"></span> Rozłączony`;
      }
    }

    const EXAMPLES = [
      "Co ma Kowalski?",
      "Auta powyżej 100k",
      "Co kupiono w 2020?",
      "Do kogo poszło BMW X5?",
      "Historia Corolli",
      "Ile aut dostępnych?"
    ];
    const examplesEl = document.getElementById("examples");
    EXAMPLES.forEach(example => {
      const btn = document.createElement("button");
      btn.className = "pill";
      btn.textContent = example;
      btn.onclick = () => { document.getElementById("questionInput").value = example; };
      examplesEl.appendChild(btn);
    });

    document.getElementById("runAgent").addEventListener("click", runAgent);
    document.getElementById("clearAgent").addEventListener("click", () => {
      document.getElementById("agentResult").innerHTML = "";
    });
    document.getElementById("questionInput").addEventListener("keydown", e => {
      if((e.ctrlKey || e.metaKey) && e.key === "Enter"){
        e.preventDefault();
        runAgent();
      }
    });

    async function runAgent(){
      const question = document.getElementById("questionInput").value.trim();
      if(!question) return;
      const out = document.getElementById("agentResult");
      const button = document.getElementById("runAgent");
      button.disabled = true;
      out.innerHTML = `<div class="card"><div class="alert info">Przetwarzam pytanie…</div></div>`;

      try{
        const resp = await apiFetch("/api/ask", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({question})
        });
        const data = await safeJson(resp);

        if(!resp.ok){
          out.innerHTML = `<div class="card"><div class="alert error">${esc(data.detail || `HTTP ${resp.status}`)}</div></div>`;
          return;
        }
        if(data.error){
          out.innerHTML = `
            <div class="card">
              <div class="alert error">${esc(data.error)}</div>
              ${data.sql_query ? `<div class="sql">${esc(data.sql_query)}</div>` : ""}
            </div>`;
          return;
        }

        const rows = data.rows || [];
        const columns = (data.columns && data.columns.length) ? data.columns : Object.keys(rows[0] || {});
        const classified = rows.filter(r => r.classification_vehicle_type).length;

        let tableHtml = `<div class="alert info">Brak wyników.</div>`;
        if(rows.length){
          tableHtml = `
            <div class="table-wrap">
              <table>
                <thead><tr>${columns.map(c => `<th>${esc(c)}</th>`).join("")}</tr></thead>
                <tbody>
                  ${rows.map(row => `<tr>${columns.map(col => {
                    let val = row[col];
                    if(col === "price") val = formatPrice(val);
                    if(col === "classification_confidence") val = formatConfidence(val);
                    if(col === "image_url" && val){
                      const url = imageUrl(val);
                      return `<td>${url ? `<img src="${esc(url)}" style="height:34px;border-radius:6px" onerror="this.style.display='none'">` : "–"}</td>`;
                    }
                    return `<td>${esc(val)}</td>`;
                  }).join("")}</tr>`).join("")}
                </tbody>
              </table>
            </div>`;
        }

        out.innerHTML = `
          <div class="grid3">
            <div class="metric"><b>${rows.length}</b><span>Rekordy</span></div>
            <div class="metric"><b>${columns.length}</b><span>Kolumny</span></div>
            <div class="metric"><b>${classified}</b><span>Sklasyfikowane</span></div>
          </div>
          <div class="card">
            <div class="label">Wygenerowany SQL</div>
            <div class="sql">${esc(data.sql_query || "")}</div>
          </div>
          <div class="card">
            <div class="label">Wyjaśnienie</div>
            <div>${esc(data.explanation || "–")}</div>
          </div>
          <div class="card">
            <div class="label">Wyniki</div>
            ${tableHtml}
          </div>`;
      }catch(err){
        out.innerHTML = `<div class="card"><div class="alert error">${esc(err.message)}</div></div>`;
      }finally{
        button.disabled = false;
      }
    }

    const fileInput = document.getElementById("fileInput");
    const fileButton = document.getElementById("runFileClassify");
    const urlInput = document.getElementById("urlInput");
    const urlButton = document.getElementById("runUrlClassify");
    fileInput.addEventListener("change", () => {
      selectedFile = fileInput.files[0] || null;
      fileButton.disabled = !selectedFile;
    });
    urlInput.addEventListener("keydown", e => {
      if(e.key === "Enter"){ e.preventDefault(); runUrlClassify(); }
    });
    fileButton.addEventListener("click", runFileClassify);
    urlButton.addEventListener("click", runUrlClassify);

    function renderClassifyResult(data, previewUrl){
      const out = document.getElementById("classifyResult");
      if(data.detail){
        out.innerHTML = `<div class="card"><div class="alert error">${esc(data.detail)}</div></div>`;
        return;
      }
      out.innerHTML = `
        <div class="card">
          <div class="row">
            <div>
              ${previewUrl ? `<img src="${esc(previewUrl)}" style="width:100%;max-width:360px;border-radius:10px;border:1px solid var(--line)" onerror="this.style.display='none'">` : ""}
            </div>
            <div>
              <div class="grid3">
                <div class="metric"><b>${esc(data.vehicle_type)}</b><span>Typ</span></div>
                <div class="metric"><b>${formatConfidence(data.confidence)}</b><span>Pewność</span></div>
                <div class="metric"><b>${esc(data.imagenet_class)}</b><span>ImageNet</span></div>
              </div>
              <div style="margin-top:10px" class="alert ${data.is_vehicle ? "ok" : "info"}">
                ${data.is_vehicle ? "Rozpoznano pojazd." : "Nie rozpoznano pojazdu."}
              </div>
            </div>
          </div>
        </div>`;
    }

    async function runUrlClassify(){
      const url = urlInput.value.trim();
      if(!url) return;
      const out = document.getElementById("classifyResult");
      urlButton.disabled = true;
      out.innerHTML = `<div class="card"><div class="alert info">Klasyfikuję obraz z URL…</div></div>`;
      try{
        const resp = await apiFetch("/api/classify", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({image_url: url})
        });
        renderClassifyResult(await safeJson(resp), url);
      }catch(err){
        out.innerHTML = `<div class="card"><div class="alert error">${esc(err.message)}</div></div>`;
      }finally{ urlButton.disabled = false; }
    }

    async function runFileClassify(){
      if(!selectedFile) return;
      const out = document.getElementById("classifyResult");
      fileButton.disabled = true;
      out.innerHTML = `<div class="card"><div class="alert info">Klasyfikuję przesłany plik…</div></div>`;
      try{
        const fd = new FormData();
        fd.append("file", selectedFile);
        const resp = await apiFetch("/api/classify/upload", {method:"POST", body: fd});
        renderClassifyResult(await safeJson(resp), URL.createObjectURL(selectedFile));
      }catch(err){
        out.innerHTML = `<div class="card"><div class="alert error">${esc(err.message)}</div></div>`;
      }finally{ fileButton.disabled = false; }
    }

    document.getElementById("fleetSearch").addEventListener("input", () => { fleetOffset = 0; renderFleet(); });
    document.getElementById("fleetStatus").addEventListener("change", () => { fleetOffset = 0; renderFleet(); });
    document.getElementById("fleetSort").addEventListener("change", () => { fleetOffset = 0; renderFleet(); });
    document.getElementById("refreshFleet").addEventListener("click", () => {
      fleetData = [];
      fleetOffset = 0;
      loadFleet();
    });

    async function loadFleet(){
      const view = document.getElementById("fleetView");
      view.innerHTML = `<div class="card"><div class="alert info">Pobieram flotę…</div></div>`;
      try{
        const resp = await apiFetch("/api/vehicles?limit=500&offset=0");
        const data = await safeJson(resp);
        if(!resp.ok || !Array.isArray(data)){
          view.innerHTML = `<div class="card"><div class="alert error">Nie udało się pobrać floty.</div></div>`;
          return;
        }
        fleetData = data;
        renderFleet();
      }catch(err){
        view.innerHTML = `<div class="card"><div class="alert error">${esc(err.message)}</div></div>`;
      }
    }

    function renderFleet(){
      const search = document.getElementById("fleetSearch").value.trim().toLowerCase();
      const status = document.getElementById("fleetStatus").value;
      const sort = document.getElementById("fleetSort").value;
      const metrics = document.getElementById("fleetMetrics");
      const view = document.getElementById("fleetView");

      let rows = [...fleetData];
      if(search) rows = rows.filter(v => `${v.brand || ""} ${v.model || ""}`.toLowerCase().includes(search));
      if(status !== "all") rows = rows.filter(v => (v.availability || "") === status);

      if(sort === "brand_asc") rows.sort((a,b) => `${a.brand||""} ${a.model||""}`.localeCompare(`${b.brand||""} ${b.model||""}`, "pl"));
      else if(sort === "price_desc") rows.sort((a,b) => Number(b.price||0) - Number(a.price||0));
      else if(sort === "price_asc") rows.sort((a,b) => Number(a.price||0) - Number(b.price||0));
      else if(sort === "year_desc") rows.sort((a,b) => Number(b.year||0) - Number(a.year||0));
      else if(sort === "year_asc") rows.sort((a,b) => Number(a.year||0) - Number(b.year||0));

      if(fleetOffset >= rows.length && fleetOffset > 0)
        fleetOffset = Math.max(0, Math.floor((rows.length - 1) / PAGE_SIZE) * PAGE_SIZE);

      const page = rows.slice(fleetOffset, fleetOffset + PAGE_SIZE);
      const availableCount = rows.filter(v => v.availability === "available").length;
      const pageNumber = Math.floor(fleetOffset / PAGE_SIZE) + 1;
      const hasPrev = fleetOffset > 0;
      const hasNext = fleetOffset + PAGE_SIZE < rows.length;

      metrics.innerHTML = `
        <div class="metric"><b>${rows.length}</b><span>Pojazdy</span></div>
        <div class="metric"><b>${availableCount}</b><span>Dostępne</span></div>
        <div class="metric"><b>${rows.length - availableCount}</b><span>Sprzedane</span></div>`;

      if(!page.length){
        view.innerHTML = `<div class="card"><div class="alert info">Brak wyników dla aktualnych filtrów.</div></div>`;
        return;
      }

      view.innerHTML = `
        <div class="card">
          <div class="right" style="margin-bottom:10px">
            <button class="btn" id="fleetPrev" ${hasPrev ? "" : "disabled"}>← Poprzednia</button>
            <span class="page-info">Strona ${pageNumber}</span>
            <button class="btn" id="fleetNext" ${hasNext ? "" : "disabled"}>Następna →</button>
          </div>
          <div class="vehicles">
            ${page.map(v => {
              const img = v.images && v.images.length ? imageUrl(v.images[0].image_url) : null;
              const avail = v.availability === "available";
              return `
                <article class="vehicle">
                  ${img ? `<img src="${esc(img)}" onerror="this.style.display='none'">` : `<div style="height:140px;background:var(--bg)"></div>`}
                  <div class="b">
                    <b>${esc(v.brand)} ${esc(v.model)}</b>
                    <div style="margin:4px 0">
                      <span class="badge ${avail ? "badge-ok" : "badge-warn"}">${avail ? "dostępny" : "sprzedany"}</span>
                      <span class="badge" style="background:rgba(99,102,241,.1);color:var(--primary-2);border:1px solid rgba(99,102,241,.15)">${esc(v.year)}</span>
                    </div>
                    <div class="muted">${formatPrice(v.price)}</div>
                  </div>
                </article>`;
            }).join("")}
          </div>
        </div>`;

      document.getElementById("fleetPrev").addEventListener("click", () => {
        if(!hasPrev) return;
        fleetOffset = Math.max(0, fleetOffset - PAGE_SIZE);
        renderFleet();
      });
      document.getElementById("fleetNext").addEventListener("click", () => {
        if(!hasNext) return;
        fleetOffset += PAGE_SIZE;
        renderFleet();
      });
    }

    loadHealth();
  </script>
</body>
</html>
